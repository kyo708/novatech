# --- Cấu hình Database PostgreSQL (Môi trường PRODUCTION thực tế) ---
# Người dùng có thể sửa đổi các thông số dưới đây để kết nối với cơ sở dữ liệu của mình!
spring.datasource.url=jdbc:postgresql://localhost:5432/novatechdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=123456

# Cấu hình Hibernate JPA cho PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
