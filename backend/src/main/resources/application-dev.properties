# --- Cấu hình Database H2 (Lưu trữ file cho môi trường DEV - Giúp bảo toàn dữ liệu khi khởi động lại) ---
spring.datasource.url=jdbc:h2:file:./data/novatechdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Cấu hình Hibernate JPA cho H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Kích hoạt bảng điều khiển H2 Console (Xem bảng tại http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
